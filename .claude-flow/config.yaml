# RuFlo V3 Runtime Configuration
# Generated: 2026-03-06T04:09:29.369Z

version: "3.0.0"

swarm:
  topology: hierarchical-mesh
  maxAgents: 15
  autoScale: true
  coordinationStrategy: consensus

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 100
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: true
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 10
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 5000
    similarityThreshold: 0.8
  agentScopes:
    enabled: true
    defaultScope: project
  defaultNamespace: iron-protocol
  # Agents write in-progress claims here to avoid duplicate work.
  # Key pattern: iron-protocol:in-progress:<role>:<task>
  coordinationKeys:
    inProgress: "iron-protocol:in-progress"
    completed:  "iron-protocol:completed"
    schemaInventory: "iron-protocol:schema-inventory"
    storageKeys: "iron-protocol:storage-keys"
    agentRegistry: "iron-protocol:agent-registry"
    ciGate: "iron-protocol:ci-gate"
    testBaseline: "iron-protocol:qa:test-baseline"

neural:
  enabled: true
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000

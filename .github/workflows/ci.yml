name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUILD_SIZE}KB"
          if [ "$BUILD_SIZE" -gt 1500 ]; then
            echo "::warning::Bundle size exceeds 1.5MB ($BUILD_SIZE KB)"
          fi

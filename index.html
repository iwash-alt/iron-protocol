<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Progressive overload fitness tracker with smart auto-regulation. Track workouts, hit PRs, and build strength with intelligent programming." />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA / Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Iron Protocol" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Iron Protocol" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Iron Protocol — Smart Strength Training" />
    <meta property="og:description" content="Progressive overload fitness tracker with smart auto-regulation. Track workouts, hit PRs, and build strength." />
    <meta property="og:image" content="/icons/icon-512.svg" />
    <meta property="og:site_name" content="Iron Protocol" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Iron Protocol — Smart Strength Training" />
    <meta name="twitter:description" content="Progressive overload fitness tracker with smart auto-regulation. Track workouts, hit PRs, and build strength." />
    <meta name="twitter:image" content="/icons/icon-512.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Iron Protocol</title>
    <script>window.__splashStart = Date.now();</script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        margin: 0;
        background: #0a0a0a;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      /* ─── Splash Screen ──────────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.15s ease, visibility 0.15s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Wordmark */
      .splash-wordmark {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 6px;
        color: #fff;
        text-transform: uppercase;
      }

      /* Red pulse ring */
      .splash-pulse {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid #FF3B30;
        margin-top: 24px;
        animation: splashRingPulse 0.8s ease-in-out infinite;
      }

      @keyframes splashRingPulse {
        0%, 100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 0 0 rgba(255,59,48,0); }
        50%       { transform: scale(1.1); opacity: 1; box-shadow: 0 0 12px 4px rgba(255,59,48,0.3); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen (visible while JS loads) -->
    <div id="splash">
      <div class="splash-wordmark">Iron Protocol</div>
      <div class="splash-pulse"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

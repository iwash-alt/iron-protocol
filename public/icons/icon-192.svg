<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="24" fill="#0a0a0a"/>
  <!-- Dumbbell -->
  <g transform="translate(96,96)">
    <!-- Outer plates -->
    <rect x="-60" y="-36" width="16" height="72" rx="4" fill="#FF3B30"/>
    <rect x="44" y="-36" width="16" height="72" rx="4" fill="#FF3B30"/>
    <!-- Inner plates -->
    <rect x="-44" y="-28" width="12" height="56" rx="3" fill="#FF3B30" opacity="0.75"/>
    <rect x="32" y="-28" width="12" height="56" rx="3" fill="#FF3B30" opacity="0.75"/>
    <!-- Bar -->
    <rect x="-32" y="-5" width="64" height="10" rx="5" fill="#fff" opacity="0.9"/>
    <!-- Bar ends -->
    <rect x="-66" y="-5" width="6" height="10" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="60" y="-5" width="6" height="10" rx="3" fill="#fff" opacity="0.5"/>
  </g>
  <!-- IP wordmark -->
  <text x="96" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="22" fill="#fff" letter-spacing="4">IRON</text>

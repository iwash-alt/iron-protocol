<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  <!-- Dumbbell -->
  <g transform="translate(256,240)">
    <!-- Outer plates -->
    <rect x="-155" y="-90" width="40" height="180" rx="10" fill="#FF3B30"/>
    <rect x="115" y="-90" width="40" height="180" rx="10" fill="#FF3B30"/>
    <!-- Inner plates -->
    <rect x="-115" y="-70" width="30" height="140" rx="8" fill="#FF3B30" opacity="0.75"/>
    <rect x="85" y="-70" width="30" height="140" rx="8" fill="#FF3B30" opacity="0.75"/>
    <!-- Bar -->
    <rect x="-85" y="-12" width="170" height="24" rx="12" fill="#fff" opacity="0.9"/>
    <!-- Bar ends -->
    <rect x="-172" y="-12" width="17" height="24" rx="8" fill="#fff" opacity="0.5"/>
    <rect x="155" y="-12" width="17" height="24" rx="8" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="56" fill="#fff" letter-spacing="10">IRON</text>
</svg>
